<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Tráfego</title>
    <script>
      function showError(msg) {
        var el = document.getElementById('loading');
        if (el) el.style.display = 'none';
        document.body.innerHTML += '<div style="padding:32px;font-family:monospace;background:#fff"><h2 style="color:#c00">Erro ao carregar</h2><pre style="background:#f5f5f5;padding:16px;border-radius:8px;overflow:auto;font-size:12px;margin-top:12px">' + msg + '</pre></div>';
      }

      // Erros de JS em execução
      window.onerror = function(msg, src, line, col, err) {
        showError(msg + '\n\nArquivo: ' + src + '\nLinha: ' + line + '\n\n' + (err && err.stack ? err.stack : ''));
      };
      // Promises rejeitadas
      window.addEventListener('unhandledrejection', function(e) {
        showError('Promise rejeitada:\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)));
      });
      // Falhas de carregamento de recursos (scripts, css) — não capturadas pelo onerror
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          showError('Falha ao carregar recurso: ' + (e.target.src || e.target.href));
        }
      }, true);
      // Timeout: se o app não montar em 10s, mostra erro
      var _appLoaded = false;
      window._markAppLoaded = function() { _appLoaded = true; };
      setTimeout(function() {
        if (!_appLoaded) {
          showError('O app não iniciou em 10 segundos.\nVerifique o console do navegador para mais detalhes (F12 > Console).');
        }
      }, 10000);
    </script>
    <script type="module" crossorigin src="/assets/index-GEfEv7Al.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-XKyp8dH8.css">
  </head>
  <body style="margin:0;background:#F5E0E0;font-family:sans-serif">
    <div id="loading" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px">
      <div style="width:36px;height:36px;border:3px solid #EDCECE;border-top:3px solid #C98B83;border-radius:50%;animation:spin 1s linear infinite"></div>
      <span style="color:#C98B83;font-size:13px;font-weight:600">Iniciando...</span>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <div id="root"></div>
  </body>
</html>
