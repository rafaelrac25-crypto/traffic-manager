<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Tráfego</title>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('loading').style.display = 'none';
        document.body.innerHTML += '<div style="padding:32px;font-family:monospace;background:#fff"><h2 style="color:#c00">Erro JavaScript</h2><pre style="background:#f5f5f5;padding:16px;border-radius:8px;overflow:auto;font-size:12px;margin-top:12px">' + msg + '\n\nArquivo: ' + src + '\nLinha: ' + line + '\n\n' + (err && err.stack ? err.stack : '') + '</pre></div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('loading').style.display = 'none';
        document.body.innerHTML += '<div style="padding:32px;font-family:monospace;background:#fff"><h2 style="color:#c00">Erro (Promise)</h2><pre style="background:#f5f5f5;padding:16px;border-radius:8px;overflow:auto;font-size:12px;margin-top:12px">' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '</pre></div>';
      });
    </script>
    <script type="module" crossorigin src="/assets/index-C3FB_PDq.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BuLG1L04.css">
  </head>
  <body style="margin:0;background:#F5E0E0;font-family:sans-serif">
    <div id="loading" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px">
      <div style="width:36px;height:36px;border:3px solid #EDCECE;border-top:3px solid #C98B83;border-radius:50%;animation:spin 1s linear infinite"></div>
      <span style="color:#C98B83;font-size:13px;font-weight:600">Iniciando...</span>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <div id="root"></div>
  </body>
</html>
