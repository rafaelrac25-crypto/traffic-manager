<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Tráfego</title>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.body.innerHTML = '<div style="padding:32px;font-family:monospace;background:#fff"><h2 style="color:#c00">Erro JavaScript</h2><pre style="background:#f5f5f5;padding:16px;border-radius:8px;overflow:auto;font-size:12px;margin-top:12px">' + msg + '\n\nArquivo: ' + src + '\nLinha: ' + line + '\n\n' + (err && err.stack ? err.stack : '') + '</pre></div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML = '<div style="padding:32px;font-family:monospace;background:#fff"><h2 style="color:#c00">Promise Rejeitada</h2><pre style="background:#f5f5f5;padding:16px;border-radius:8px;overflow:auto;font-size:12px;margin-top:12px">' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '</pre></div>';
      });
    </script>
