<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>AdManager — Encerrado</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #2b1620 0%, #1a0d15 100%);
      color: #f5e6ee;
      display: grid;
      place-items: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 520px;
      width: 100%;
      text-align: center;
      padding: 40px 28px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(193, 53, 132, 0.25);
      border-radius: 16px;
      backdrop-filter: blur(8px);
    }
    .dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #C13584;
      margin-right: 8px;
      vertical-align: middle;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 12px;
      letter-spacing: -0.01em;
    }
    p { margin: 12px 0; line-height: 1.55; font-size: 15px; opacity: 0.88; }
    .muted { font-size: 13px; opacity: 0.55; margin-top: 28px; }
  </style>
</head>
<body>
  <main>
    <p style="margin-top:0"><span class="dot"></span><span style="font-size:12px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.7">Encerrado</span></p>
    <h1>AdManager — Cris Costa Beauty</h1>
    <p>Este painel foi desativado e não está mais em operação.</p>
    <p class="muted">Nenhum dado é coletado. Nenhuma integração está ativa.</p>
  </main>
</body>
</html>
